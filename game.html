<!DOCTYPE html>
<html lang="zh-CN">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=no">
<title>🚀 Rocket Galaxy</title>
<style>
*{margin:0;padding:0;box-sizing:border-box}
html,body{width:100%;height:100%;overflow:hidden;background:#1a1a1a}
body{display:flex;align-items:center;justify-content:center;font-family:"PingFang SC","Microsoft YaHei",sans-serif}
canvas{display:block;image-rendering:pixelated}
#ui{position:absolute;top:0;left:0;width:100%;height:100%;pointer-events:none;z-index:10}

.start-overlay{position:absolute;top:0;left:0;width:100%;height:100%;display:flex;align-items:center;justify-content:center;pointer-events:auto;z-index:20}
.start-overlay.hidden{display:none}
.start-card{background:#fff;border:3px solid #111;border-radius:20px;padding:30px 40px;text-align:center;box-shadow:8px 8px 0 #111;max-width:380px}
.start-card h1{font-size:1.6rem;color:#111;margin-bottom:8px;letter-spacing:2px}
.start-card .emoji{font-size:3rem;display:block;margin-bottom:12px}
.start-card .hint{font-size:0.85rem;color:#888;margin-top:16px}
.start-card kbd{display:inline-block;padding:3px 10px;background:#111;color:#fff;border-radius:4px;font-size:0.9em}

.success-card{position:absolute;bottom:100px;left:50%;transform:translateX(-50%);background:#fff;border:3px solid #111;border-radius:16px;padding:20px 24px;max-width:360px;width:90%;text-align:center;pointer-events:auto;display:none;z-index:30;box-shadow:6px 6px 0 #111}
.success-card.show{display:block}
.success-card h3{font-size:1rem;color:#111;margin-bottom:10px}
.success-card .pname{font-weight:bold;font-size:0.95rem;color:#111;word-break:break-all}
.success-card .pdesc{font-size:0.8rem;color:#666;margin:6px 0}
.success-card .pstars{font-size:0.75rem;color:#999}
.success-card .plink{display:inline-block;margin-top:8px;padding:6px 14px;background:#111;color:#fff;text-decoration:none;border-radius:8px;font-size:0.8rem}
.success-card .collect-btn{display:block;margin:10px auto 0;padding:8px 20px;background:#fff;border:2px solid #111;border-radius:10px;font-size:0.85rem;cursor:pointer;font-weight:bold}
.success-card .collect-btn:hover{background:#111;color:#fff}

.touch-pad{position:absolute;bottom:30px;left:0;right:0;display:none;pointer-events:auto;z-index:15;padding:0 20px}
@media(pointer:coarse){.touch-pad{display:flex;gap:10px;justify-content:center;align-items:center}}
.touch-pad button{width:55px;height:55px;border-radius:14px;border:2px solid #111;background:rgba(255,255,255,0.9);font-size:1.2rem;cursor:pointer;touch-action:manipulation}
.touch-pad .big-btn{padding:0 24px;width:auto;font-weight:bold}
.hint-bar{position:absolute;bottom:20px;left:50%;transform:translateX(-50%);text-align:center;pointer-events:none;z-index:5}
.hint-bar span{font-size:0.7rem;color:rgba(255,255,255,0.5);letter-spacing:1px}

.counter{position:absolute;top:16px;left:20px;pointer-events:none;z-index:5}
.counter .dots{display:flex;gap:4px;margin-top:4px}
.counter .dot{width:8px;height:8px;border-radius:50%;background:rgba(255,255,255,0.2)}
.counter .dot.on{background:#fff;box-shadow:0 0 6px #fff}
</style>
</head>
<body>

<canvas id="c"></canvas>

<div id="ui">
  <div class="start-overlay" id="startScreen">
    <div class="start-card" id="startCard">
      <span class="emoji" id="galaxyEmoji">🌌</span>
      <h1 id="galaxyName">太阳系</h1>
      <p class="hint">按 <kbd>SPACE</kbd> 发射火箭</p>
    </div>
  </div>

  <div class="success-card" id="successCard">
    <h3>🎯 对接成功！</h3>
    <div class="pname" id="pName"></div>
    <div class="pdesc" id="pDesc"></div>
    <div class="pstars" id="pStars"></div>
    <a class="plink" id="pLink" href="#" target="_blank">查看项目 →</a>
    <button class="collect-btn" id="collectBtn">收集 ⭐</button>
  </div>

  <div class="counter" id="counter">
    <div class="dots">
      <span class="dot"></span><span class="dot"></span><span class="dot"></span>
      <span class="dot"></span><span class="dot"></span><span class="dot"></span>
      <span class="dot"></span><span class="dot"></span><span class="dot"></span>
    </div>
  </div>

  <div class="touch-pad" id="touchPad">
    <button id="tbL">◀</button>
    <button id="tbD">▼</button>
    <button id="tbU">▲</button>
    <button id="tbR">▶</button>
    <button class="big-btn" id="tbLaunch" style="background:#111;color:#fff">🚀</button>
  </div>

  <div class="hint-bar"><span>↑↓ speed ←→ steer SPACE launch R reset</span></div>
</div>

<script>
// ─── Constants ───
const W=800,H=600;

// ─── Galaxies Data ───
const GALAXIES=[
  {name:'太阳系',emoji:'☀️',desc:'我们的家园 · 1颗恒星 · 8颗行星',spin:0.6,orbit:110,color:'#333'},
  {name:'半人马座α',emoji:'⭐',desc:'最近的恒星系统 · 距地球4.37光年',spin:0.8,orbit:115,color:'#444'},
  {name:'天狼星',emoji:'💫',desc:'夜空最亮的恒星 · 距地球8.6光年',spin:0.9,orbit:118,color:'#3a3a3a'},
  {name:'仙女座星系',emoji:'🌌',desc:'万亿恒星 · 距地球250万光年',spin:1.1,orbit:125,color:'#555'},
  {name:'猎户座星云',emoji:'✨',desc:'恒星摇篮 · 距地球1344光年',spin:1.2,orbit:120,color:'#4a4a4a'},
  {name:'昴星团',emoji:'💫',desc:'七姐妹星团 · 约1000颗恒星',spin:1.0,orbit:122,color:'#3c3c3c'},
  {name:'大麦哲伦云',emoji:'🌠',desc:'银河系最大卫星星系 · 300亿恒星',spin:1.3,orbit:128,color:'#505050'},
  {name:'草帽星系',emoji:'🎩',desc:'独特的尘埃环 · 1000亿恒星',spin:1.4,orbit:132,color:'#585858'},
  {name:'涡状星系',emoji:'🌀',desc:'完美螺旋结构 · 1600亿恒星',spin:1.5,orbit:135,color:'#484848'},
  {name:'车轮星系',emoji:'🛞',desc:'独特的车轮形状 · 500亿恒星',spin:1.7,orbit:140,color:'#606060'},
];

const FALLBACK=[
  {id:'fb-1',name:'ollama/ollama',desc:'Run LLMs locally.',url:'https://github.com/ollama/ollama',stars:125000},
  {id:'fb-2',name:'langchain-ai/langchain',desc:'Build reasoning apps.',url:'https://github.com/langchain-ai/langchain',stars:105000},
  {id:'fb-3',name:'AutoGPT',desc:'Autonomous AI agents.',url:'https://github.com/Significant-Gravitas/AutoGPT',stars:172000},
  {id:'fb-4',name:'transformers',desc:'State-of-the-art ML.',url:'https://github.com/huggingface/transformers',stars:140000},
  {id:'fb-5',name:'tensorflow',desc:'ML framework for everyone.',url:'https://github.com/tensorflow/tensorflow',stars:190000},
  {id:'fb-6',name:'pytorch',desc:'Dynamic neural networks.',url:'https://github.com/pytorch/pytorch',stars:87000},
  {id:'fb-7',name:'claude-code',desc:'Agentic coding by Anthropic.',url:'https://github.com/anthropics/claude-code',stars:30000},
  {id:'fb-8',name:'DeepSeek-V3',desc:'Strong cost-effective MoE LLM.',url:'https://github.com/deepseek-ai/DeepSeek-V3',stars:55000},
  {id:'fb-9',name:'whisper',desc:'Robust speech recognition.',url:'https://github.com/openai/whisper',stars:75000},
  {id:'fb-10',name:'Meta Llama',desc:"Meta's LLM.",url:'https://github.com/meta-llama/llama',stars:60000},
  {id:'fb-11',name:'gpt-pilot',desc:'AI that builds full apps.',url:'https://github.com/Pythagora-io/gpt-pilot',stars:32000},
  {id:'fb-12',name:'stable-diffusion',desc:'Image synthesis model.',url:'https://github.com/Stability-AI/stablediffusion',stars:40000},
  {id:'fb-13',name:'sglang',desc:'Fast LLM inference.',url:'https://github.com/sgl-project/sglang',stars:15000},
  {id:'fb-14',name:'vllm',desc:'High-throughput LLM serving.',url:'https://github.com/vllm-project/vllm',stars:45000},
  {id:'fb-15',name:'dify',desc:'LLM app development platform.',url:'https://github.com/langgenius/dify',stars:60000},
];

// ─── State ───
const STATE={START:'start',PLAY:'play',SUCCESS:'success',COLLECTED:'collected',COMPLETE:'complete',WARP:'warp'};
let state=STATE.START;
let keys={};
let time=0,lastTime=0;
let galaxyIdx=0;
let galaxyAngle=0;
let rocket={x:400,y:520,speed:120,angle:-Math.PI/2,lit:false,docked:false,tx:0,ty:0,ta:0};
let particles=[];
let stars=[];
let collected=[];
let projectCache=[];
let pendingProject=null;
let fetched=false;
let warpP=0,warpPhase='';
let hudAlpha=5;

// ─── DOM ───
const canvas=document.getElementById('c');
const ctx=canvas.getContext('2d');
const startScreen=document.getElementById('startScreen');
const startCard=document.getElementById('startCard');
const galaxyNameEl=document.getElementById('galaxyName');
const galaxyEmojiEl=document.getElementById('galaxyEmoji');
const successCard=document.getElementById('successCard');
const touchPad=document.getElementById('touchPad');

canvas.width=W;canvas.height=H;

// ─── Init stars ───
for(let i=0;i<200;i++){
  stars.push({x:Math.random()*W,y:Math.random()*H,r:0.3+Math.random()*2,a:0.3+Math.random()*0.7,s:0.5+Math.random()*2,o:Math.random()*Math.PI*2});
}

// ─── Resize ───
function resize(){
  const s=Math.min(window.innerWidth/W,window.innerHeight/H);
  canvas.style.width=W*s+'px';
  canvas.style.height=H*s+'px';
}
resize();
window.addEventListener('resize',resize);

// ─── Input ───
window.addEventListener('keydown',e=>{
  keys[e.code]=true;
  if(e.code==='Space'){
    e.preventDefault();
    if(state===STATE.START) launch();
    else if(state===STATE.COLLECTED) resetRocket();
    else if(state===STATE.COMPLETE) warp();
  }
  if(e.code==='KeyR'&&state===STATE.PLAY) resetRocket();
});
window.addEventListener('keyup',e=>{keys[e.code]=false});

// Touch
const tbU=document.getElementById('tbU'),tbD=document.getElementById('tbD'),tbL=document.getElementById('tbL'),tbR=document.getElementById('tbR'),tbLaunch=document.getElementById('tbLaunch');
function setupTouch(el,code){
  el.addEventListener('touchstart',e=>{e.preventDefault();keys[code]=true});
  el.addEventListener('touchend',e=>{e.preventDefault();keys[code]=false});
}
setupTouch(tbU,'ArrowUp');setupTouch(tbD,'ArrowDown');setupTouch(tbL,'ArrowLeft');setupTouch(tbR,'ArrowRight');
tbLaunch.addEventListener('touchstart',e=>{
  e.preventDefault();
  if(state===STATE.START) launch();
  else if(state===STATE.COLLECTED) resetRocket();
  else if(state===STATE.COMPLETE) warp();
});
document.getElementById('collectBtn').addEventListener('click',()=>{
  if(state===STATE.SUCCESS) collect();
});

// ─── Galaxy functions ───
function loadGalaxy(){
  const g=GALAXIES[galaxyIdx];
  galaxyNameEl.textContent=g.name;
  galaxyEmojiEl.textContent=g.emoji;
  startCard.querySelector('.hint').innerHTML='按 <kbd>SPACE</kbd> 发射火箭';
  startScreen.classList.remove('hidden');
  galaxyAngle=0;
  rocket={x:400,y:520,speed:120,angle:-Math.PI/2,lit:false,docked:false,tx:0,ty:0,ta:0};
  collected=[];
  fetched=false;
  projectCache=[];
  pendingProject=null;
  updateDots();
}

// ─── Launch / Reset ───
function launch(){
  state=STATE.PLAY;
  startScreen.classList.add('hidden');
  rocket.x=400;rocket.y=520;rocket.speed=120;rocket.angle=-Math.PI/2;rocket.docked=false;rocket.lit=false;
  hudAlpha=5;
  if(!fetched) fetchProjects();
}
function resetRocket(){
  state=STATE.PLAY;
  rocket.x=400;rocket.y=520;rocket.speed=120;rocket.angle=-Math.PI/2;rocket.docked=false;rocket.lit=false;
  pendingProject=null;
  successCard.classList.remove('show');
  hudAlpha=5;
}

// ─── API ───
async function fetchProjects(){
  fetched=true;
  try{
    const r=await fetch('https://api.github.com/search/repositories?q=topic:artificial-intelligence+topic:machine-learning&sort=stars&order=desc&per_page=15');
    if(r.ok){
      const d=await r.json();
      projectCache=d.items.map(i=>({id:'gh-'+i.id,name:i.full_name,desc:i.description||'An AI project',url:i.html_url,stars:i.stargazers_count}));
    }
  }catch(e){}
  if(projectCache.length<5) projectCache=FALLBACK;
}
function nextProject(){
  if(projectCache.length===0) return FALLBACK[Math.floor(Math.random()*FALLBACK.length)];
  const avail=projectCache.filter(p=>!collected.includes(p.id));
  if(avail.length===0) return projectCache[Math.floor(Math.random()*projectCache.length)];
  return avail[Math.floor(Math.random()*avail.length)];
}

// ─── Dock / Collect ───
function dock(project){
  state=STATE.SUCCESS;
  pendingProject=project;
  rocket.docked=true;
  const slot=getSlot();
  rocket.tx=slot.x;rocket.ty=slot.y;rocket.ta=slot.angle;
  document.getElementById('pName').textContent=project.name;
  document.getElementById('pDesc').textContent=project.desc;
  document.getElementById('pStars').textContent='⭐ '+fmtStars(project.stars);
  document.getElementById('pLink').href=project.url;
  successCard.classList.add('show');
  // Particles
  for(let i=0;i<30;i++){
    const a=(i/30)*Math.PI*2;
    particles.push({x:rocket.x,y:rocket.y,vx:Math.cos(a)*(40+Math.random()*60),vy:Math.sin(a)*(40+Math.random()*60),life:1,ml:1,size:1.5+Math.random()*3,type:'spark'});
  }
}
function collect(){
  if(!pendingProject) return;
  state=STATE.COLLECTED;
  collected.push(pendingProject.id);
  rocket.lit=true;
  pendingProject=null;
  successCard.classList.remove('show');
  for(let i=0;i<20;i++){
    const a=(i/20)*Math.PI*2;
    particles.push({x:rocket.x,y:rocket.y,vx:Math.cos(a)*30,vy:Math.sin(a)*30-10,life:1.5,ml:1.5,size:2+Math.random()*3,type:'glow'});
  }
  updateDots();
  if(collected.length>=9){
    setTimeout(()=>{state=STATE.COMPLETE;showComplete();},1500);
  }
}
function fmtStars(n){
  if(n>=100000) return Math.floor(n/1000)+'k';
  if(n>=10000) return (n/1000).toFixed(1)+'k';
  return String(n);
}
function updateDots(){
  const dots=document.querySelectorAll('#counter .dot');
  dots.forEach((d,i)=>{d.classList.toggle('on',i<collected.length)});
}

// ─── Warp ───
function warp(){
  state=STATE.WARP;
  warpP=0;
  warpPhase='out';
  startScreen.classList.add('hidden');
}
function showComplete(){
  const g=GALAXIES[galaxyIdx];
  document.getElementById('galaxyEmoji').textContent='🚀';
  document.getElementById('galaxyName').textContent=g.name+' 完成！';
  startCard.querySelector('.hint').innerHTML='按 <kbd>SPACE</kbd> 前往下一个星系';
  startScreen.classList.remove('hidden');
}

// ─── Slot ───
function getSlot(){
  const g=GALAXIES[galaxyIdx];
  const a=galaxyAngle+Math.PI*0.25;
  return{
    x:400+Math.cos(a)*g.orbit,
    y:130+Math.sin(a)*g.orbit,
    angle:a+Math.PI/2
  };
}

// ─── Update ───
function update(dt){
  const g=GALAXIES[galaxyIdx];
  galaxyAngle+=g.spin*dt;

  if(state===STATE.PLAY){
    if(keys['ArrowUp']) rocket.speed=Math.min(rocket.speed+200*dt,350);
    if(keys['ArrowDown']) rocket.speed=Math.max(rocket.speed-220*dt,40);
    if(keys['ArrowLeft']) rocket.angle-=3*dt;
    if(keys['ArrowRight']) rocket.angle+=3*dt;
    rocket.angle=Math.max(-Math.PI*0.85,Math.min(-Math.PI*0.15,rocket.angle));
    rocket.x+=Math.cos(rocket.angle)*rocket.speed*dt;
    rocket.y+=Math.sin(rocket.angle)*rocket.speed*dt;
    if(rocket.x<-30)rocket.x=W+30;if(rocket.x>W+30)rocket.x=-30;
    if(rocket.y<-60)rocket.y=H+60;if(rocket.y>H+60)rocket.y=-60;

    // Fire
    if(Math.random()<0.5){
      particles.push({x:rocket.x,y:rocket.y+22,vx:Math.cos(rocket.angle+Math.PI+(Math.random()-0.5)*0.3)*(20+Math.random()*50),vy:Math.sin(rocket.angle+Math.PI+(Math.random()-0.5)*0.3)*(20+Math.random()*50),life:0.4+Math.random()*0.3,ml:0.7,size:1+Math.random()*2.5,type:'fire'});
    }

    // Collision
    if(!rocket.docked){
      const slot=getSlot();
      const dist=Math.hypot(rocket.x-slot.x,rocket.y-slot.y);
      if(dist<28) dock(nextProject());
    }
  }

  if(state===STATE.SUCCESS&&rocket.docked){
    rocket.x+=(rocket.tx-rocket.x)*5*dt;
    rocket.y+=(rocket.ty-rocket.y)*5*dt;
    rocket.angle+=(rocket.ta-rocket.angle)*5*dt;
  }

  // Particles
  for(let i=particles.length-1;i>=0;i--){
    const p=particles[i];
    p.life-=dt;
    if(p.life<=0){particles.splice(i,1);continue}
    p.x+=p.vx*dt;p.y+=p.vy*dt;
    p.vx*=0.97;p.vy*=0.97;
  }

  // HUD fade
  if(hudAlpha>0) hudAlpha-=dt/3;

  // Warp
  if(state===STATE.WARP){
    warpP=Math.min(warpP+dt/5,1);
    if(warpP>=1){
      galaxyIdx=(galaxyIdx+1)%GALAXIES.length;
      loadGalaxy();
      state=STATE.START;
    }
  }
}

// ─── Draw ───
function draw(){
  ctx.clearRect(0,0,W,H);

  // Background - paper texture feel
  ctx.fillStyle='#f5f5f0';
  ctx.fillRect(0,0,W,H);

  // Stars (drawn as tiny crosses for sketch feel)
  for(const s of stars){
    const tw=0.5+0.5*Math.sin(time*s.s+s.o);
    const a=s.a*(0.5+0.5*tw);
    const moveY=Math.sin(time*0.3+stars.indexOf(s))*0.3;
    const sy=s.y+moveY;

    ctx.strokeStyle=`rgba(80,80,80,${a})`;
    ctx.lineWidth=s.r*0.5;
    ctx.beginPath();
    // Tiny cross
    const sz=s.r*1.5;
    ctx.moveTo(s.x-sz,sy);ctx.lineTo(s.x+sz,sy);
    ctx.moveTo(s.x,sy-sz);ctx.lineTo(s.x,sy+sz);
    ctx.stroke();
  }

  // Galaxy
  drawGalaxy();

  // Rocket
  if(state!==STATE.WARP) drawRocket();

  // Particles
  for(const p of particles){
    const a=p.life/p.ml;
    if(p.type==='fire'){
      ctx.fillStyle=`rgba(40,40,40,${a})`;
    }else if(p.type==='spark'){
      ctx.fillStyle=`rgba(20,20,20,${a})`;
    }else{
      ctx.fillStyle=`rgba(60,60,60,${a*0.6})`;
    }
    ctx.beginPath();
    ctx.arc(p.x,p.y,p.size*a,0,Math.PI*2);
    ctx.fill();
  }

  // Warp effect
  if(state===STATE.WARP) drawWarp();

  // HUD hint
  if(state===STATE.PLAY&&hudAlpha>0){
    ctx.fillStyle=`rgba(100,100,100,${Math.min(hudAlpha,0.6)})`;
    ctx.font='11px "PingFang SC","Microsoft YaHei",sans-serif';
    ctx.textAlign='center';
    ctx.fillText('↑↓ speed  ←→ steer  R reset',W/2,H-30);
  }
  if(state===STATE.START){
    const pulse=0.5+0.5*Math.sin(time*2);
    ctx.fillStyle=`rgba(80,80,80,${0.3+pulse*0.3})`;
    ctx.font='11px "PingFang SC","Microsoft YaHei",sans-serif';
    ctx.textAlign='center';
    ctx.fillText('按 SPACE 发射',W/2,H-30);
  }
}

function drawGalaxy(){
  const g=GALAXIES[galaxyIdx];
  const cx=400,cy=130;

  // Outer glow - soft pencil-like
  for(let i=3;i>=1;i--){
    const r=g.orbit*1.3+i*20;
    const grad=ctx.createRadialGradient(cx,cy,10,cx,cy,r);
    grad.addColorStop(0,'rgba(40,40,40,0.12)');
    grad.addColorStop(0.6,'rgba(60,60,60,0.05)');
    grad.addColorStop(1,'transparent');
    ctx.fillStyle=grad;
    ctx.beginPath();ctx.arc(cx,cy,r,0,Math.PI*2);ctx.fill();
  }

  // Orbit ring - dashed hand-drawn feel
  ctx.save();
  ctx.translate(cx,cy);
  ctx.rotate(galaxyAngle);
  ctx.setLineDash([4,6]);
  ctx.strokeStyle='rgba(60,60,60,0.3)';
  ctx.lineWidth=1.5;
  ctx.beginPath();ctx.arc(0,0,g.orbit,0,Math.PI*2);ctx.stroke();
  ctx.setLineDash([]);

  // Spiral arms - sketchy
  for(let a=0;a<4;a++){
    const base=(a/4)*Math.PI*2;
    ctx.strokeStyle='rgba(50,50,50,0.15)';
    ctx.lineWidth=6+a;
    ctx.beginPath();
    for(let r=14;r<g.orbit*1.2;r+=3){
      const sa=base+r*0.035;
      const sx=Math.cos(sa)*r,sy=Math.sin(sa)*r;
      r===14?ctx.moveTo(sx,sy):ctx.lineTo(sx,sy);
    }
    ctx.stroke();
  }
  ctx.restore();

  // Core
  ctx.fillStyle='#111';
  ctx.beginPath();ctx.arc(cx,cy,8,0,Math.PI*2);ctx.fill();
  ctx.fillStyle='#fff';
  ctx.beginPath();ctx.arc(cx,cy,3,0,Math.PI*2);ctx.fill();

  // Target slot
  const slot=getSlot();
  const pulse=0.6+0.4*Math.sin(time*3);
  // Outer ring
  ctx.strokeStyle=`rgba(0,0,0,${pulse})`;
  ctx.lineWidth=2.5;
  ctx.beginPath();ctx.arc(slot.x,slot.y,20,0,Math.PI*2);ctx.stroke();
  // Inner ring
  ctx.setLineDash([2,2]);
  ctx.strokeStyle=`rgba(0,0,0,${pulse*0.6})`;
  ctx.lineWidth=1.5;
  ctx.beginPath();ctx.arc(slot.x,slot.y,14,0,Math.PI*2);ctx.stroke();
  ctx.setLineDash([]);
  // Arrow
  ctx.save();
  ctx.translate(slot.x,slot.y);
  ctx.rotate(slot.angle);
  ctx.fillStyle=`rgba(0,0,0,${pulse})`;
  ctx.beginPath();
  ctx.moveTo(18,0);ctx.lineTo(10,-4);ctx.lineTo(10,4);ctx.closePath();
  ctx.fill();
  ctx.restore();
}

function drawRocket(){
  ctx.save();
  const sway=state===STATE.START?Math.sin(performance.now()/1000*1.5)*3:0;
  ctx.translate(rocket.x,rocket.y+sway);
  ctx.rotate(rocket.angle+Math.PI/2);

  if(rocket.lit){
    ctx.shadowColor='rgba(0,0,0,0.3)';
    ctx.shadowBlur=12;
  }

  // Body - pill shape
  const w=28,h=48,r=14;
  ctx.fillStyle='#fff';
  ctx.strokeStyle='#111';
  ctx.lineWidth=2.5;
  ctx.beginPath();
  ctx.arc(0,-h/2+r,r,Math.PI,0,false);
  ctx.lineTo(w/2,h/2-r);
  ctx.arc(0,h/2-r,r,0,Math.PI,false);
  ctx.lineTo(-w/2,-h/2+r);
  ctx.closePath();
  ctx.fill();
  ctx.stroke();

  // Nose cone - dark
  ctx.fillStyle='#111';
  ctx.beginPath();
  ctx.arc(0,-h/2+r,r*0.6,Math.PI,0,false);
  ctx.fill();

  // Stripe
  ctx.fillStyle='#111';
  ctx.fillRect(-w/2,-3,w,6);

  // Window
  ctx.fillStyle='#fff';
  ctx.strokeStyle='#111';
  ctx.lineWidth=2;
  ctx.beginPath();
  ctx.arc(0,-13,7,0,Math.PI*2);
  ctx.fill();
  ctx.stroke();
  // Window shine
  ctx.fillStyle='#fff';
  ctx.beginPath();
  ctx.arc(-2,-15,2.5,0,Math.PI*2);
  ctx.fill();

  // Fins
  ctx.fillStyle='#111';
  ctx.beginPath();
  ctx.moveTo(-w/2+2,h/2-12);ctx.lineTo(-w/2-10,h/2+6);ctx.lineTo(-w/2+6,h/2-2);ctx.closePath();
  ctx.fill();
  ctx.beginPath();
  ctx.moveTo(w/2-2,h/2-12);ctx.lineTo(w/2+10,h/2+6);ctx.lineTo(w/2-6,h/2-2);ctx.closePath();
  ctx.fill();

  // Engine
  ctx.fillStyle='#333';
  ctx.beginPath();
  ctx.moveTo(-4,h/2-r+2);ctx.lineTo(-7,h/2+3);ctx.lineTo(7,h/2+3);ctx.lineTo(4,h/2-r+2);ctx.closePath();
  ctx.fill();

  // Cute face
  ctx.strokeStyle='#111';
  ctx.lineWidth=1.5;
  // Eyes
  ctx.fillStyle='#111';
  ctx.beginPath();ctx.arc(-4,-6,2.5,0,Math.PI*2);ctx.fill();
  ctx.beginPath();ctx.arc(4,-6,2.5,0,Math.PI*2);ctx.fill();
  // Eye highlights
  ctx.fillStyle='#fff';
  ctx.beginPath();ctx.arc(-3,-7,1,0,Math.PI*2);ctx.fill();
  ctx.beginPath();ctx.arc(5,-7,1,0,Math.PI*2);ctx.fill();
  // Mouth
  ctx.beginPath();ctx.arc(0,-3,2.5,0.2,Math.PI-0.2);ctx.stroke();
  // Blush
  ctx.fillStyle='rgba(0,0,0,0.1)';
  ctx.beginPath();ctx.ellipse(-8,0,3,2,0,0,Math.PI*2);ctx.fill();
  ctx.beginPath();ctx.ellipse(8,0,3,2,0,0,Math.PI*2);ctx.fill();

  ctx.shadowColor='transparent';
  ctx.shadowBlur=0;
  ctx.restore();
}

function drawWarp(){
  const p=warpP;
  ctx.fillStyle=`rgba(245,245,240,${p<0.4?p/0.4*0.8:0.8})`;
  ctx.fillRect(0,0,W,H);

  if(p<0.45){
    // Hyperspace lines
    const stretch=p/0.45*500;
    for(let i=0;i<100;i++){
      const x=Math.random()*W,y=Math.random()*H;
      ctx.strokeStyle=`rgba(40,40,40,${0.3+Math.random()*0.5})`;
      ctx.lineWidth=0.5+Math.random()*1.5;
      ctx.beginPath();
      ctx.moveTo(x,y);ctx.lineTo(x+(Math.random()-0.5)*stretch,y-stretch*0.7);
      ctx.stroke();
    }
  }else if(p<0.7){
    // Ship
    const sp=(p-0.45)/0.25;
    const sx=W/2,sy=H/2+Math.sin(sp*Math.PI)*40;
    ctx.save();ctx.translate(sx,sy);
    ctx.scale(1+sp*0.2,1+sp*0.2);
    ctx.fillStyle='#111';
    ctx.beginPath();
    ctx.moveTo(0,-50);ctx.lineTo(35,25);ctx.lineTo(12,18);
    ctx.lineTo(8,35);ctx.lineTo(-8,35);ctx.lineTo(-12,18);
    ctx.lineTo(-35,25);ctx.closePath();
    ctx.fill();
    ctx.fillStyle='#fff';
    ctx.strokeStyle='#111';
    ctx.lineWidth=1.5;
    ctx.beginPath();ctx.ellipse(0,-10,8,14,0,0,Math.PI*2);ctx.fill();ctx.stroke();
    ctx.restore();
    // Label
    ctx.fillStyle='#111';
    ctx.font='bold 14px "PingFang SC","Microsoft YaHei",sans-serif';
    ctx.textAlign='center';
    ctx.fillText('自然选择号',sx,sy-80);
  }else{
    // Arriving
    const g=GALAXIES[(galaxyIdx+1)%GALAXIES.length];
    ctx.fillStyle='#111';
    ctx.font='bold 18px "PingFang SC","Microsoft YaHei",sans-serif';
    ctx.textAlign='center';
    ctx.fillText(g.emoji+' '+g.name,W/2,H/2-20);
    ctx.fillStyle='#555';
    ctx.font='13px "PingFang SC","Microsoft YaHei",sans-serif';
    ctx.fillText(g.desc,W/2,H/2+20);
  }
}

// ─── Loop ───
function loop(ts){
  const dt=lastTime?Math.min((ts-lastTime)/1000,0.05):0.016;
  lastTime=ts;time+=dt;
  update(dt);
  draw();
  requestAnimationFrame(loop);
}

// ─── Boot ───
loadGalaxy();
requestAnimationFrame(loop);
</script>
