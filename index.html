<!DOCTYPE html>
<html lang="zh-CN">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=no">
<title>🚀 星际对接 · Star Dock</title>
<style>
*{margin:0;padding:0;box-sizing:border-box}
html,body{width:100vw;height:100vh;height:100dvh;overflow:hidden;background:#0a0a0f}
canvas{display:block;position:fixed;top:0;left:0}
#ui{position:fixed;top:0;left:0;width:100%;height:100%;pointer-events:none;z-index:10;font-family:"PingFang SC","Microsoft YaHei",sans-serif}

.start-overlay{position:absolute;top:0;left:0;width:100%;height:100%;display:flex;align-items:center;justify-content:center;pointer-events:auto;z-index:20;transition:opacity 0.35s}
.start-overlay.hidden{opacity:0;pointer-events:none}
.start-card{background:rgba(12,12,18,0.96);border:1px solid rgba(255,255,255,0.1);border-radius:20px;padding:36px 44px;text-align:center;max-width:440px;backdrop-filter:blur(12px)}
.start-card .galaxy-num{font-size:0.7rem;color:rgba(255,255,255,0.3);letter-spacing:4px;text-transform:uppercase;margin-bottom:8px}
.start-card h1{font-size:1.6rem;color:#eee;margin-bottom:12px;letter-spacing:3px;font-weight:300}
.start-card .galaxy-desc{font-size:0.82rem;color:rgba(255,255,255,0.55);line-height:1.7;margin-bottom:14px;font-style:italic}
.start-card .progress-row{display:flex;gap:5px;justify-content:center;margin:10px 0}
.start-card .pdot{width:7px;height:7px;border-radius:50%;border:1px solid rgba(255,255,255,0.15);transition:all 0.4s}
.start-card .pdot.done{background:#ffd700;border-color:#ffd700;box-shadow:0 0 8px rgba(255,215,0,0.5)}
.start-card .launch-hint{margin-top:14px}
.start-card kbd{display:inline-block;padding:4px 14px;background:rgba(255,255,255,0.06);color:#aaa;border:1px solid rgba(255,255,255,0.15);border-radius:5px;font-size:0.8em;letter-spacing:1px}
.start-card .launch-hint span{color:rgba(255,255,255,0.4);font-size:0.78rem;margin-left:4px}

.toast{position:fixed;top:50%;left:50%;transform:translate(-50%,-50%);pointer-events:none;z-index:40;opacity:0;transition:all 0.5s}
.toast.show{opacity:1}
.toast .toast-card{background:rgba(15,15,20,0.95);border:1.5px solid rgba(255,255,255,0.15);border-radius:14px;padding:18px 26px;max-width:420px;text-align:center;backdrop-filter:blur(10px)}
.toast .t-quote{font-size:0.95rem;color:#ddd;line-height:1.5;font-style:italic;margin-bottom:8px}
.toast .t-author{font-size:0.75rem;color:#777}
.toast .t-project{font-size:0.9rem;color:#fff;font-weight:bold;margin-bottom:4px}
.toast .t-desc{font-size:0.78rem;color:#aaa;line-height:1.4;margin-bottom:4px}
.toast .t-stars{font-size:0.7rem;color:#888}
.toast .t-link{display:inline-block;margin-top:8px;padding:5px 12px;background:rgba(255,255,255,0.08);color:#ccc;text-decoration:none;border-radius:6px;font-size:0.75rem;border:1px solid rgba(255,255,255,0.15);pointer-events:auto}
.toast .t-link:hover{background:rgba(255,255,255,0.15);color:#fff}
.toast .t-planet-header{font-size:0.85rem;color:#ddd;margin-top:10px;padding-top:10px;border-top:1px solid rgba(255,255,255,0.1);font-weight:bold}
.toast .t-planet-info{font-size:0.73rem;color:#aaa;margin-top:6px;line-height:1.5;text-align:left;max-height:180px;overflow-y:auto;padding-right:4px}
.toast .t-planet-visual{font-size:0.7rem;color:#999;margin-top:10px;padding:8px 10px;background:rgba(255,255,255,0.03);border-radius:8px;line-height:1.6;text-align:left;font-family:monospace}
.toast .t-planet-visual .stat{display:flex;justify-content:space-between;margin:2px 0}
.toast .t-planet-visual .stat .val{color:#ddd}

.hud{position:absolute;top:16px;left:20px;pointer-events:none;z-index:5}
.hud .sysname{font-size:0.78rem;color:rgba(255,255,255,0.45);letter-spacing:2px;margin-bottom:4px}
.hud .lit-dots{display:flex;gap:4px}
.hud .lit-dots .ld{width:6px;height:6px;border-radius:50%;border:1px solid rgba(255,255,255,0.15);transition:all 0.5s}
.hud .lit-dots .ld.on{background:#ffd700;border-color:#ffd700;box-shadow:0 0 8px rgba(255,215,0,0.5)}

.touch-pad{position:fixed;bottom:20px;left:0;right:0;display:none;pointer-events:auto;z-index:15;padding:0 14px}
@media(pointer:coarse){.touch-pad{display:flex;gap:6px;justify-content:center;align-items:center;flex-wrap:wrap}}
.touch-pad button{width:48px;height:48px;border-radius:12px;border:1.5px solid rgba(255,255,255,0.25);background:rgba(20,20,25,0.85);color:#ccc;font-size:1rem;cursor:pointer;touch-action:manipulation}
.touch-pad .big-btn{padding:0 18px;width:auto;font-weight:bold;font-size:0.8rem}
</style>
</head>
<body>

<canvas id="c"></canvas>

<div id="ui">
  <div class="start-overlay" id="startScreen">
    <div class="start-card">
      <p class="galaxy-num" id="galaxyNum">#1</p>
      <h1 id="sysName">太阳系</h1>
      <p class="galaxy-desc" id="sysDesc">在无垠的黑暗中，一颗恒星点燃了八簇星火。</p>
      <div class="progress-row" id="progressDots"></div>
      <p class="launch-hint"><kbd>SPACE</kbd> <span>发射</span></p>
    </div>
  </div>

  <div class="toast" id="toast">
    <div class="toast-card">
      <div class="t-quote" id="tQuote"></div>
      <div class="t-author" id="tAuthor"></div>
      <div class="t-planet-header" id="tPlanetHeader"></div>
      <div class="t-planet-info" id="tPlanetInfo"></div>
      <div class="t-planet-visual" id="tPlanetVisual"></div>
    </div>
  </div>

  <div class="hud">
    <div class="sysname" id="hudName">太阳系</div>
    <div class="lit-dots" id="litDots"></div>
  </div>

  <div class="touch-pad" id="touchPad">
    <button id="tbL">◀</button><button id="tbD">▼</button><button id="tbU">▲</button><button id="tbR">▶</button>
    <button class="big-btn" id="tbLaunch" style="background:rgba(255,255,255,0.1);border-color:rgba(255,255,255,0.3)">LAUNCH</button>
  </div>
</div>

<script>
// ─────────────────────────────────
//  STAR DOCK — 星际对接 v3
// ─────────────────────────────────

const canvas = document.getElementById('c');
const ctx = canvas.getContext('2d');
let W, H, dpr;

// ─── Solar Systems with rich planet data ───
const SOLAR_SYSTEMS = [
  {
    name: '太阳系', emoji:'☀️', desc: '在无垠的黑暗中，一颗恒星点燃了八簇星火。这是我们旅程的起点，也是所有故事的摇篮。从这里出发，你将驶向群星。',
    planets: [
      { name:'水星', emoji:'☿', dist:0.39, period:0.24, size:5, temp:'hot', info:'水星是太阳系中最小的行星，也是距离太阳最近的行星。它的表面布满了撞击坑，看起来很像月球。由于没有大气层保护，水星表面昼夜温差极为剧烈——白天可达430°C，夜晚则骤降至-180°C。水星绕太阳一周仅需88天，但自转一周却需要59天。有趣的是，水星每自转三圈恰好绕太阳两圈，形成了一种独特的3:2轨道共振。NASA的信使号探测器曾绕水星飞行四年，发现水星极地陨石坑深处可能存在水冰。' },
      { name:'金星', emoji:'♀', dist:0.72, period:0.62, size:7, temp:'hot', info:'金星是太阳系中最亮的行星，被称为"启明星"或"长庚星"。它的大小和质量与地球相近，常被称为地球的"姐妹行星"。金星被一层厚厚的二氧化碳大气包裹，表面大气压是地球的92倍，相当于地球海洋深处900米的压力。浓厚的温室效应使金星表面温度高达465°C——比最靠近太阳的水星还热。金星的自转方向与大多数行星相反（逆行自转），也就是说在金星上太阳从西边升起。前苏联的金星探测器曾成功着陆并传回了金星表面的图像，但只坚持了不到两小时就被高温和高压摧毁。' },
      { name:'地球', emoji:'🌍', dist:1.00, period:1.00, size:7, temp:'warm', info:'地球是太阳系中目前已知唯一孕育了生命的天体，也是人类在浩瀚宇宙中的唯一家园。它拥有液态水的海洋、富含氧的大气层、以及适中的温度——这一切得益于它恰好位于太阳系的"宜居带"内。地球的磁场保护我们免受太阳风的侵袭，月球稳定了地球的自转轴倾角，使气候保持相对稳定。从太空中看，地球是一颗美丽的蓝色弹珠，覆盖着白色的云层和绿色的大陆。卡尔·萨根曾说："再看看那个点吧。那是这里，那是家园，那是我们。在这颗小小尘埃上，你所爱的每一个人，你所认识的每一个人，都度过了一生。"' },
      { name:'火星', emoji:'♂', dist:1.52, period:1.88, size:5, temp:'warm', info:'火星因其红色的外表而被称为"红色星球"，这种红色来自表面丰富的氧化铁（铁锈）。火星拥有太阳系最高的山——奥林帕斯山高达21.9公里，几乎三倍于珠穆朗玛峰。水手号峡谷长达4000公里，几乎可以横跨整个美国。大量证据表明，数十亿年前的火星表面有液态水流动，甚至可能存在过海洋。如今，多个探测器正在火星表面工作，寻找过去或现在生命存在的迹象。埃隆·马斯克的SpaceX公司计划在本世纪内将人类送上火星，建立永久性定居点。火星是人类成为多行星物种的第一站。' },
      { name:'木星', emoji:'♃', dist:2.50, period:4.50, size:15, temp:'cool', info:'木星是太阳系中最大的行星，它如此巨大，以至于其质量超过了所有其他行星质量总和的2.5倍。木星的大红斑是一个持续了超过350年的超级风暴，其直径比整个地球还大。这颗气态巨星没有固体表面，主要由氢和氦组成，内部压力极大，甚至可能将氢压缩成金属态。木星拥有95颗已知卫星，其中最大的四颗——木卫一、木卫二、木卫三和木卫四——由伽利略于1610年发现。木卫二冰冷的表面下被认为存在一个全球性的液态海洋，是太阳系中寻找外星生命最有希望的地点之一。' },
      { name:'土星', emoji:'♄', dist:3.20, period:7.00, size:13, temp:'cool', info:'土星以其壮观的环系统而闻名，这些环主要由数十亿个冰粒和岩石碎片组成，从微小的尘埃到房屋大小的巨石不等。尽管环系统直径达到28万公里，但其厚度通常不到10米——在比例上比一张纸还薄。土星是太阳系中密度最低的行星，其平均密度只有0.69g/cm³，理论上可以浮在水面上（如果有足够大的水池）。土星最大的卫星土卫六（Titan）是太阳系中唯一拥有稠密大气层的卫星，表面存在液态甲烷湖泊和河流。卡西尼号探测器在土星轨道工作了13年，最后以壮丽的方式坠入土星大气层，结束了它20年的使命。' },
      { name:'天王星', emoji:'⛢', dist:4.00, period:12.0, size:9, temp:'cold', info:'天王星是太阳系中最神秘的行星之一。它的自转轴几乎完全倒向一侧——倾斜了约98度——像一颗"滚着走"的行星。这意味着天王星的极地可以直接面对太阳，导致极端的季节变化：每个极点会经历42年的持续日照，接着是42年的完全黑暗。天王星的蓝绿色来自大气中的甲烷吸收了红光。天王星的环系统非常暗淡，直到1977年才被发现。它拥有27颗已知卫星，这些卫星多以莎士比亚戏剧中的人物命名。天王星和它的邻居海王星被统称为"冰巨星"，因为它们含有比木星和土星更多的水、氨和甲烷冰。' },
      { name:'海王星', emoji:'♆', dist:4.50, period:16.0, size:9, temp:'cold', info:'海王星是太阳系最远的行星，也是唯一通过数学预测而非直接观测发现的行星。1846年，天文学家注意到天王星的轨道存在异常，推测可能有一颗未知行星的引力在影响它。法国数学家勒维耶通过计算预测了这颗行星的位置，柏林天文台的加勒当晚就在预测位置附近找到了它——这是牛顿力学最伟大的胜利之一。海王星拥有太阳系中最强的风，风速可高达每小时2100公里。它最大的卫星海卫一（Triton）是一颗冰冻的世界，表面有活跃的冰火山喷发出氮气。海王星绕太阳一周需要165年——从发现至今，它只完成了一圈公转。' },
    ]
  },
  {
    name: '比邻星系', emoji:'⭐', desc: '四光年的距离，在宇宙的尺度上只是一步之遥。三颗恒星在引力中舞蹈，行星在暗处低语——也许，那里也有眼睛在回望我们。',
    planets: [
      { name:'比邻b', emoji:'🪐', dist:0.35, period:0.30, size:5, temp:'warm', info:'比邻星b是一颗位于比邻星宜居带内的类地行星，质量约为地球的1.2倍。它距离我们仅4.2光年，是已知距离地球最近的系外行星。比邻星b绕其主星运行一周仅需11.2天，但由于比邻星是一颗红矮星，辐射出的能量远小于太阳，因此比邻星b的表面温度可能刚好适合液态水的存在。不过，红矮星频繁的耀斑活动可能已经剥离了行星的大气层，这使得它的宜居性仍然存在争议。如果人类有朝一日能够向其他恒星系统发射探测器，比邻星b无疑将是首选目标。' },
      { name:'比邻c', emoji:'🪐', dist:0.65, period:0.70, size:6, temp:'cool', info:'比邻星c是一颗超级地球，质量约为地球的7倍，在距离比邻星约1.5天文单位的轨道上运行。这颗行星于2019年通过径向速度法发现，其轨道周期约为5.2年。由于距离主星较远，其表面温度极低，可能被冰层覆盖。比邻星c的发现表明，即使是距离我们最近的恒星系统，也可能拥有一个复杂的多行星架构。它的存在挑战了我们对红矮星周围行星形成的理论模型。' },
      { name:'比邻d', emoji:'🪐', dist:0.95, period:1.20, size:4, temp:'cool', info:'比邻星d是一颗于2022年新确认的系外行星，质量仅为地球的0.26倍，是已知质量最小的系外行星之一。它非常靠近比邻星，轨道周期仅约5天。如此小的质量意味着它几乎肯定是一颗岩石行星，表面可能被熔岩覆盖。比邻星d的发现使用了欧洲南方天文台的甚大望远镜，标志着径向速度测量技术已经精确到了足以探测亚地球质量行星的程度。' },
      { name:'Prox e', emoji:'🪐', dist:1.50, period:2.20, size:8, temp:'cold', info:'比邻星e是一颗理论预测的气态行星，质量约为地球的15倍，大致相当于海王星的质量。它可能拥有一个由冰粒和岩石碎片组成的稀疏环系统。由于距离主星较远，它的温度极低，大气中可能含有大量的氢和氦。比邻星e的存在尚未得到完全确认，但多个独立的天文学团队都发现了支持它存在的证据。如果被证实，它将是比邻星系中第四颗被确认的行星。' },
      { name:'Prox f', emoji:'🪐', dist:2.20, period:4.00, size:11, temp:'cold', info:'比邻星f是该系统最外层的理论行星，可能是一颗冰巨星，类似于太阳系中的天王星和海王星。它的质量约为地球的25倍，大气中富含氢和氦。由于距离比邻星非常远，表面温度可能接近绝对零度。如果这颗行星确实存在，它可能拥有多个冰卫星，其中一些卫星的内部可能存在液态水海洋。这颗行星的发现将进一步证明，即使是距离我们最近的恒星系统，也可能拥有丰富多样的行星家族。' },
    ]
  },
  {
    name: 'TRAPPIST-1', emoji:'💫', desc: '四十光年外，七颗地球的姐妹在暗红太阳的注视下旋转。它们靠得如此之近，以至于站在一颗上，可以看见邻星在天空中缓缓升起——如同巨大的月亮，讲述着近在咫尺却永不相触的故事。',
    planets: [
      { name:'TRAPPIST-1b', emoji:'🪐', dist:0.25, period:0.25, size:5, temp:'hot', info:'TRAPPIST-1b是该系统最内层的岩石行星，被潮汐锁定——总是一面永远朝向它的恒星。这种锁定意味着它的一面是永恒的炽热白昼，另一面则是永夜。虽然其密度与地球相近，但其表面温度极高，不太可能适宜生命存在。科学家通过韦伯太空望远镜的观测发现，这颗行星很可能没有大气层，表面类似于水星——只是一个裸露的岩石球体。' },
      { name:'TRAPPIST-1c', emoji:'🪐', dist:0.40, period:0.50, size:5, temp:'hot', info:'TRAPPIST-1c的密度与地球非常相似，这暗示它可能拥有类似的岩石组成。科学家曾猜测它可能有一个稠密的二氧化碳大气层，但韦伯望远镜的最新观测表明它可能也是裸露的岩石行星。即使没有大气层，它的存在仍然具有重大意义——它证明了小型红矮星周围可以形成与地球密度相似的岩石行星，这对于寻找类地行星来说是一个重要的发现。' },
      { name:'TRAPPIST-1d', emoji:'🪐', dist:0.55, period:0.75, size:5, temp:'warm', info:'TRAPPIST-1d是系统中质量最小的行星，仅为地球的0.3倍——大约相当于火星的质量。它是如何形成的仍然是一个未解之谜。由于引力较弱，它可能没办法保持浓厚的大气层。但它的存在本身就令人着迷：在距离我们仅40光年的地方，一个微小的岩石世界正在静静地绕着它的暗红色太阳运行。' },
      { name:'TRAPPIST-1e', emoji:'🌍', dist:0.70, period:1.00, size:6, temp:'warm', info:'TRAPPIST-1e是整个系统中与地球最为相似的行星。它位于恒星的宜居带正中央，质量、大小和密度都与地球非常接近。科学家认为它是该系统中最有可能存在液态水——乃至生命——的地方。它接收到的恒星能量与地球从太阳接收的能量相当。韦伯望远镜的科学家们正在密切观测这颗行星，试图分析它的大气成分，寻找水蒸气、氧气和甲烷等可能的生命信号。如果人类要选择第一颗拍摄到大气光谱的宜居带类地行星，TRAPPIST-1e很可能就是答案。' },

// ─── Planet color by temperature ───
function planetColors(temp) {
  // Unlit = dark, lit = BRIGHT temperature colors
  switch (temp) {
    case 'hot':  return { body:'#222', glow:'#ff2200', lit:'#ff4400', name:'🔥 红热行星' };
    case 'warm': return { body:'#222', glow:'#ff9900', lit:'#ffbb00', name:'🌤 温暖行星' };
    case 'cool': return { body:'#222', glow:'#2299ff', lit:'#44bbff', name:'❄ 凉爽行星' };
    case 'cold': return { body:'#222', glow:'#3366ff', lit:'#6699ff', name:'🧊 冰冷行星' };
    default:     return { body:'#222', glow:'#999', lit:'#bbb', name:'未知' };
  }
}

// ─── State ───
const S = { START:'start', PLAY:'play', DOCK:'dock', COMPLETE:'complete', WARP:'warp' };
let state = S.START;
let keys = {};
let time = 0, lastTime = 0;
let sysIdx = 0;
let systemData;
let planets = [];
let rocket = { x:0, y:0, px:0, py:0, speed:0, angle:0, docking:false, tx:0, ty:0, ta:0 };
let targetPlanetIdx = 0;
let particles = [];
let bgStars = [];
let collected = [];
let shownQuotes = new Set();
let warpP = 0;
let hudAlpha = 3;
let dockCooldown = 0;
let lives = 0;
let maxLives = 0;

// ─── DOM ───
const startScreen = document.getElementById('startScreen');
const toast = document.getElementById('toast');
const sysNameEl = document.getElementById('sysName');
const sysDescEl = document.getElementById('sysDesc');
const galaxyNumEl = document.getElementById('galaxyNum');
const progressDotsEl = document.getElementById('progressDots');
const hudNameEl = document.getElementById('hudName');
const litDotsEl = document.getElementById('litDots');

// ─── Resize ───
function resize() {
  dpr = Math.min(window.devicePixelRatio || 1, 2);
  W = window.innerWidth;
  H = window.innerHeight;
  canvas.width = W * dpr;
  canvas.height = H * dpr;
  canvas.style.width = W + 'px';
  canvas.style.height = H + 'px';
  ctx.setTransform(1, 0, 0, 1, 0, 0);
  ctx.scale(dpr, dpr);
}
window.addEventListener('resize', resize);
resize();

// ─── Init stars ───
for (let i = 0; i < 350; i++) {
  bgStars.push({
    x: Math.random(), y: Math.random(),
    r: 0.2 + Math.random() * 2.2,
    a: 0.15 + Math.random() * 0.7,
    s: 0.5 + Math.random() * 3,
    o: Math.random() * Math.PI * 2
  });
}

// ─── Input ───
window.addEventListener('keydown', e => {
  keys[e.code] = true;
  if (e.code === 'Space') {
    e.preventDefault();
    if (state === S.START) launch();
    else if (state === S.DOCK) resumeAfterDock();
    else if (state === S.COMPLETE) warp();
  }
  if (e.code === 'KeyR' && state === S.PLAY) respawn();
});
window.addEventListener('keyup', e => { keys[e.code] = false; });

// Touch controls
['tbU','ArrowUp','tbD','ArrowDown','tbL','ArrowLeft','tbR','ArrowRight'].forEach((v,i,arr)=>{
  if (i%2===0){
    const el=document.getElementById(v);
    if(el){
      el.addEventListener('touchstart',e=>{
        e.preventDefault();
        keys[arr[i+1]]=true;
      });
      el.addEventListener('touchend',e=>{e.preventDefault();keys[arr[i+1]]=false});
    }
  }
});
document.getElementById('tbLaunch')?.addEventListener('touchstart', e => {
  e.preventDefault();
  if (state === S.START) launch();
  else if (state === S.DOCK) resumeAfterDock();
  else if (state === S.COMPLETE) warp();
});

// ─── System ───
function loadSystem() {
  systemData = SOLAR_SYSTEMS[sysIdx % SOLAR_SYSTEMS.length];
  planets = systemData.planets.map((p, i) => ({
    ...p, angle: Math.random() * Math.PI * 2, lit: false, idx: i
  }));
  targetPlanetIdx = findNextTarget();
  collected = [];
  shownQuotes.clear();
  // Lives = planets count + (10 - galaxyIdx)
  maxLives = planets.length + (10 - sysIdx);
  lives = maxLives;
  updateHUD();
  updateStartScreen();

  rocket = { x: W/2, y: H*0.88, px: W/2, py: H*0.88, speed: 0, angle: -Math.PI/2, docking: false, tx: 0, ty: 0, ta: 0 };
  state = S.START;
}

function findNextTarget() {
  const unlit = planets.map((p,i) => ({p,i})).filter(x => !x.p.lit);
  if (unlit.length === 0) return 0;
  // Pick random unlit planet
  return unlit[Math.floor(Math.random() * unlit.length)].i;
}

function updateHUD() {
  hudNameEl.textContent = systemData.name + ' · ❤' + lives;
  let html = '';
  for (let i = 0; i < planets.length; i++) {
    html += `<span class="ld${collected.includes(i) ? ' on' : ''}"></span>`;
  }
  litDotsEl.innerHTML = html;
}

function updateStartScreen() {
  sysNameEl.textContent = systemData.name;
  galaxyNumEl.textContent = '#' + (sysIdx + 1);
  sysDescEl.textContent = systemData.desc;
  // Show lives in the launch hint
  document.querySelector('.launch-hint span').textContent = '发射 · ❤' + lives;
  let dots = '';
  for (let i = 0; i < planets.length; i++) {
    dots += `<span class="pdot${collected.includes(i) ? ' done' : ''}"></span>`;
  }
  progressDotsEl.innerHTML = dots;
  startScreen.classList.remove('hidden');
  toast.classList.remove('show');
}

// ─── Planet position ───
function getPlanetPos(idx) {
  const p = planets[idx];
  const cx = W / 2;
  const cy = H * 0.42;
  const maxDist = Math.min(W, H) * 0.38;
  const maxDataDist = systemData.planets[systemData.planets.length - 1].dist;
  const dist = (p.dist / maxDataDist) * maxDist * 0.85;
  return {
    x: cx + Math.cos(p.angle) * dist,
    y: cy + Math.sin(p.angle) * dist,
    dist, cx, cy
  };
}

// ─── Launch / Respawn ───
function launch() {
  state = S.PLAY;
  startScreen.classList.add('hidden');
  toast.classList.remove('show');
  rocket.speed = 80 + sysIdx * 15;
  rocket.angle = -Math.PI / 2;
  rocket.docking = false;
  rocket.x = W / 2;
  rocket.y = H * 0.88;
  rocket.px = rocket.x;
  rocket.py = rocket.y;
  hudAlpha = 3;
  lives = maxLives;
  updateHUD();
}
function respawn() {
  lives--;
  updateHUD();
  if (lives <= 0) {
    failGalaxy();
    return;
  }
  rocket.x = W / 2;
  rocket.y = H * 0.88;
  rocket.speed = 80 + sysIdx * 15;
  rocket.angle = -Math.PI / 2;
  rocket.docking = false;
  rocket.px = rocket.x;
  rocket.py = rocket.y;
}

function failGalaxy() {
  if (sysIdx === 0) {
    // First galaxy: restart from beginning
    sysIdx = 0;
    loadSystem();
    // Show failure toast
    document.getElementById('tQuote').textContent = '"失败是成功之母。每一次坠落，都是为更高的飞翔做准备。"';
    document.getElementById('tAuthor').textContent = '— 重启中...';
    document.getElementById('tPlanetHeader').textContent = '';
    document.getElementById('tPlanetInfo').textContent = '';
    document.getElementById('tPlanetVisual').textContent = '';
    toast.classList.add('show');
    state = S.START;
    return;
  }
  // Later galaxies: fall back to previous galaxy
  sysIdx--;
  loadSystem();
  document.getElementById('tQuote').textContent = '"你的征程尚未结束。回到上一个星系，重新点亮那些熄灭的星光。"';
  document.getElementById('tAuthor').textContent = '— 回退至 ' + SOLAR_SYSTEMS[sysIdx].name;
  document.getElementById('tPlanetHeader').textContent = '';
  document.getElementById('tPlanetInfo').textContent = '';
  document.getElementById('tPlanetVisual').textContent = '';
  toast.classList.add('show');
  state = S.START;
}

// ─── Resume after dock (triggered by arrow key) ───
function resumeAfterDock() {
  if (state !== S.DOCK) return;
  toast.classList.remove('show');
  if (collected.length >= planets.length) {
    state = S.COMPLETE;
    showComplete();
    return;
  }
  // One press: dismiss card and resume flying
  state = S.PLAY;
  rocket.speed = 80 + sysIdx * 15;
  rocket.angle = -Math.PI / 2;
  rocket.docking = false;
  rocket.px = rocket.x;
  rocket.py = rocket.y;
  targetPlanetIdx = findNextTarget();
  hudAlpha = 2;
}

function nextQuote() {
  const avail = AI_QUOTES.filter((_, i) => !shownQuotes.has(i));
  if (avail.length === 0) { shownQuotes.clear(); return AI_QUOTES[Math.floor(Math.random() * AI_QUOTES.length)]; }
  const q = avail[Math.floor(Math.random() * avail.length)];
  shownQuotes.add(AI_QUOTES.indexOf(q));
  return q;
}

// ─── Dock = light up + show unified card ───
function dock() {
  const planet = planets[targetPlanetIdx];
  const pos = getPlanetPos(targetPlanetIdx);
  const colors = planetColors(planet.temp);

  // Light up the planet
  planet.lit = true;
  collected.push(targetPlanetIdx);
  dockCooldown = 1.5;

  // Quote
  const quote = nextQuote();
  document.getElementById('tQuote').textContent = quote.text;
  document.getElementById('tAuthor').textContent = '— ' + quote.author;

  // Planet header
  document.getElementById('tPlanetHeader').textContent = planet.emoji + ' ' + planet.name + ' · ' + colors.name;

  // Planet detail info
  document.getElementById('tPlanetInfo').textContent = planet.info;

  // Visual stats card
  const orbitDays = (planet.period * 365).toFixed(0);
  const distAU = planet.dist.toFixed(2);
  const tempLabel = planet.temp === 'hot' ? '>400°C' : planet.temp === 'warm' ? '-50~50°C' : planet.temp === 'cool' ? '-100~-30°C' : '<-150°C';
  const typeLabel = planet.temp === 'hot' || planet.temp === 'warm' ? '岩石行星' : '气态/冰质行星';
  document.getElementById('tPlanetVisual').innerHTML = `
    <div class="stat"><span>🌡 表面温度</span><span class="val">${tempLabel}</span></div>
    <div class="stat"><span>📏 距恒星</span><span class="val">${distAU} AU</span></div>
    <div class="stat"><span>🔄 公转周期</span><span class="val">${orbitDays} 天</span></div>
    <div class="stat"><span>🪨 类型</span><span class="val">${typeLabel}</span></div>
    <div class="stat"><span>⭐ 状态</span><span class="val">已点亮 ✨</span></div>
  `;

  toast.classList.add('show');
  state = S.DOCK;
  // Stop rocket at dock position
  rocket.speed = 0;
  rocket.docking = true;
  rocket.x = pos.x; rocket.y = pos.y;
  rocket.tx = pos.x; rocket.ty = pos.y; rocket.ta = planet.angle;

  updateHUD();

  // Spark particles
  for (let i = 0; i < 35; i++) {
    const a = (i / 35) * Math.PI * 2;
    particles.push({
      x: rocket.x, y: rocket.y,
      vx: Math.cos(a) * (25 + Math.random() * 60),
      vy: Math.sin(a) * (25 + Math.random() * 60),
      life: 1.5, ml: 1.5, size: 1.5 + Math.random() * 3.5, type: 'spark',
      color: colors.glow
    });
  }
}

// ─── Complete / Warp ───
function showComplete() {
  sysNameEl.textContent = systemData.name + ' ✓';
  galaxyNumEl.textContent = '#' + (sysIdx + 1);
  sysDescEl.textContent = '所有行星已被点亮。自然选择号引擎就绪。';
  const nextSys = SOLAR_SYSTEMS[(sysIdx + 1) % SOLAR_SYSTEMS.length];
  document.querySelector('.launch-hint span').textContent = '启程 · ' + nextSys.name + ' · ❤' + lives;
  updateStartScreen();
  startScreen.classList.remove('hidden');
}
function warp() {
  state = S.WARP;
  warpP = 0;
  startScreen.classList.add('hidden');
}

// ─── Update ───
function update(dt) {
  // Planet orbits
  const baseSpeed = (2 * Math.PI) / 2.0;
  for (const p of planets) {
    p.angle += baseSpeed * (1.0 / p.period) * dt;
  }

  // Cooldown
  if (dockCooldown > 0) dockCooldown -= dt;

  if (state === S.PLAY) {
    // Save previous position for swept collision
    rocket.px = rocket.x;
    rocket.py = rocket.y;

    // Controls - speed only increases, base speed grows per galaxy
    const minSpeed = 80 + sysIdx * 15; // galaxy 1: 80, galaxy 2: 95, ..., galaxy 10: 215
    if (keys['ArrowUp']) rocket.speed = Math.min(rocket.speed + 250 * dt, 450);
    // ArrowDown disabled — speed can only go up in this galaxy
    if (keys['ArrowLeft']) rocket.angle -= 3.8 * dt;
    if (keys['ArrowRight']) rocket.angle += 3.8 * dt;
    rocket.angle = Math.max(-Math.PI * 0.85, Math.min(-Math.PI * 0.15, rocket.angle));
    // Maintain minimum speed for this galaxy
    if (rocket.speed < minSpeed) rocket.speed = minSpeed;

    rocket.x += Math.cos(rocket.angle) * rocket.speed * dt;
    rocket.y += Math.sin(rocket.angle) * rocket.speed * dt;

    // Wrap
    if (rocket.x < -40) rocket.x = W + 40;
    if (rocket.x > W + 40) rocket.x = -40;
    if (rocket.y < -80) rocket.y = H + 80;
    if (rocket.y > H + 80) rocket.y = -80;

    // Fire trail
    if (Math.random() < 0.55) {
      particles.push({
        x: rocket.x, y: rocket.y + 18,
        vx: Math.cos(rocket.angle + Math.PI + (Math.random() - 0.5) * 0.25) * (12 + Math.random() * 40),
        vy: Math.sin(rocket.angle + Math.PI + (Math.random() - 0.5) * 0.25) * (12 + Math.random() * 40),
        life: 0.3 + Math.random() * 0.25, ml: 0.55, size: 0.8 + Math.random() * 2, type: 'fire', color: '#aaa'
      });
    }

    // Collision: simple distance check with cooldown
    if (dockCooldown <= 0) {
      const tgt = planets[targetPlanetIdx];
      if (tgt && !tgt.lit) {
        const tpos = getPlanetPos(targetPlanetIdx);
        const dist = Math.hypot(rocket.x - tpos.x, rocket.y - tpos.y);
        const threshold = tgt.size + 20; // scales with planet size
        if (dist < threshold) {
          dock();
        }
      }
    }
  }

  if (state === S.DOCK && rocket.docking) {
    rocket.x += (rocket.tx - rocket.x) * 5 * dt;
    rocket.y += (rocket.ty - rocket.y) * 5 * dt;
    rocket.angle += (rocket.ta - rocket.angle) * 5 * dt;
  }

  // Particles
  for (let i = particles.length - 1; i >= 0; i--) {
    const p = particles[i];
    p.life -= dt;
    if (p.life <= 0) { particles.splice(i, 1); continue; }
    p.x += p.vx * dt; p.y += p.vy * dt;
    p.vx *= 0.96; p.vy *= 0.96;
  }
  if (particles.length > 400) particles.splice(0, particles.length - 400);

  // HUD fade
  if (hudAlpha > 0) hudAlpha -= dt / 2.5;

  // Warp
  if (state === S.WARP) {
    warpP = Math.min(warpP + dt / 4.5, 1);
    if (warpP >= 1) {
      sysIdx = (sysIdx + 1) % SOLAR_SYSTEMS.length;
      loadSystem();
      state = S.START;
    }
  }
}

// ─── Draw ───
function draw() {
  ctx.clearRect(0, 0, W, H);
  ctx.fillStyle = '#09090d';
  ctx.fillRect(0, 0, W, H);

  // Stars
  for (const s of bgStars) {
    const sx = s.x * W, sy = s.y * H;
    const tw = 0.5 + 0.5 * Math.sin(time * s.s + s.o);
    const a = s.a * (0.5 + 0.5 * tw);
    ctx.fillStyle = `rgba(255,255,255,${a})`;
    if (s.r < 0.7) ctx.fillRect(sx, sy, dpr < 2 ? 1 : 0.6, dpr < 2 ? 1 : 0.6);
    else { ctx.beginPath(); ctx.arc(sx, sy, s.r, 0, Math.PI * 2); ctx.fill(); }
  }

  drawSolarSystem();

  if (state !== S.WARP) drawRocket();

  // Particles
  for (const p of particles) {
    const a = p.life / p.ml;
    if (p.type === 'fire') {
      ctx.fillStyle = `rgba(180,180,180,${a})`;
    } else if (p.type === 'spark') {
      ctx.fillStyle = `rgba(255,255,255,${a})`;
      ctx.shadowColor = p.color ? p.color.replace(')', `,${a*0.5})`).replace('rgb','rgba') : `rgba(255,255,255,${a*0.4})`;
      ctx.shadowBlur = 5;
    } else {
      ctx.fillStyle = `rgba(255,255,255,${a*0.7})`;
    }
    ctx.beginPath(); ctx.arc(p.x, p.y, p.size * a, 0, Math.PI * 2); ctx.fill();
    ctx.shadowColor = 'transparent'; ctx.shadowBlur = 0;
  }

  // HUD
  if (state === S.PLAY && hudAlpha > 0) {
    ctx.fillStyle = `rgba(180,180,180,${Math.min(hudAlpha*0.35,0.45)})`;
    ctx.font = '11px "PingFang SC","Microsoft YaHei",sans-serif';
    ctx.textAlign = 'center';
    const livesStr = lives <= 3 ? ' ⚠' + lives + '⚠' : ' ❤' + lives;
    ctx.fillText('↑ speed  ←→ steer  R reset' + livesStr, W/2, H-18);
  }
  if (state === S.START) {
    const pulse = 0.5+0.5*Math.sin(time*2);
    ctx.fillStyle = `rgba(200,200,200,${0.2+pulse*0.2})`;
    ctx.font = '11px "PingFang SC","Microsoft YaHei",sans-serif';
    ctx.textAlign = 'center';
    ctx.fillText('按 SPACE 发射', W/2, H-18);
  }
  if (state === S.DOCK) {
    const pulse = 0.5+0.5*Math.sin(time*2);
    ctx.fillStyle = `rgba(200,200,200,${0.35+pulse*0.25})`;
    ctx.font = '12px "PingFang SC","Microsoft YaHei",sans-serif';
    ctx.textAlign = 'center';
    ctx.fillText('按 SPACE 继续飞行', W/2, H-18);
  }

  if (state === S.WARP) drawWarp();
}

function drawSolarSystem() {
  const cx = W / 2;
  const cy = H * 0.42;
  const maxDist = Math.min(W, H) * 0.38;
  const maxDataDist = systemData.planets[systemData.planets.length - 1].dist;

  // Sun glow
  const sunGrad = ctx.createRadialGradient(cx, cy, 0, cx, cy, 32);
  sunGrad.addColorStop(0, '#fff');
  sunGrad.addColorStop(0.2, '#ffeedd');
  sunGrad.addColorStop(0.5, '#886644');
  sunGrad.addColorStop(1, 'transparent');
  ctx.fillStyle = sunGrad;
  ctx.beginPath(); ctx.arc(cx, cy, 32, 0, Math.PI*2); ctx.fill();

  // Sun core
  ctx.fillStyle = '#fff';
  ctx.beginPath(); ctx.arc(cx, cy, 10, 0, Math.PI*2); ctx.fill();

  // Orbits + planets
  for (let i = 0; i < planets.length; i++) {
    const p = planets[i];
    const orbitR = (p.dist / maxDataDist) * maxDist * 0.85;

    // Orbit line
    ctx.strokeStyle = p.lit ? 'rgba(255,255,255,0.18)' : 'rgba(255,255,255,0.04)';
    ctx.lineWidth = p.lit ? 1.2 : 0.6;
    ctx.setLineDash(p.lit ? [] : [2, 10]);
    ctx.beginPath(); ctx.arc(cx, cy, orbitR, 0, Math.PI*2); ctx.stroke();
    ctx.setLineDash([]);

    const px = cx + Math.cos(p.angle) * orbitR;
    const py = cy + Math.sin(p.angle) * orbitR;
    const colors = planetColors(p.temp);

    // Lit planet - huge bright glow
    if (p.lit) {
      // Outer glow halo
      const haloSize = p.size * 5;
      const halo = ctx.createRadialGradient(px, py, p.size*0.3, px, py, haloSize);
      // Convert hex glow to rgba for gradient
      const r = parseInt(colors.glow.slice(1,3),16);
      const g = parseInt(colors.glow.slice(3,5),16);
      const b = parseInt(colors.glow.slice(5,7),16);
      halo.addColorStop(0, `rgba(${r},${g},${b},1)`);
      halo.addColorStop(0.25, `rgba(${r},${g},${b},0.7)`);
      halo.addColorStop(0.5, `rgba(${r},${g},${b},0.2)`);
      halo.addColorStop(1, 'transparent');
      ctx.fillStyle = halo;
      ctx.beginPath(); ctx.arc(px, py, haloSize, 0, Math.PI*2); ctx.fill();

      // Inner white-hot core
      const core = ctx.createRadialGradient(px, py, 0, px, py, p.size*1.3);
      const lr = parseInt(colors.lit.slice(1,3),16);
      const lg = parseInt(colors.lit.slice(3,5),16);
      const lb = parseInt(colors.lit.slice(5,7),16);
      core.addColorStop(0, '#ffffff');
      core.addColorStop(0.3, `rgba(${lr},${lg},${lb},1)`);
      core.addColorStop(1, 'transparent');
      ctx.fillStyle = core;
      ctx.beginPath(); ctx.arc(px, py, p.size*1.3, 0, Math.PI*2); ctx.fill();
    }

    // Planet body
    ctx.fillStyle = p.lit ? colors.lit : colors.body;
    ctx.strokeStyle = p.lit ? 'rgba(255,255,255,0.8)' : 'rgba(255,255,255,0.2)';
    ctx.lineWidth = p.lit ? 2 : 1;
    ctx.shadowColor = p.lit ? colors.glow : 'transparent';
    ctx.shadowBlur = p.lit ? 8 : 0;
    ctx.beginPath(); ctx.arc(px, py, p.size, 0, Math.PI*2); ctx.fill();
    ctx.stroke();
    ctx.shadowColor = 'transparent'; ctx.shadowBlur = 0;

    // Target indicator
    if (i === targetPlanetIdx && state === S.PLAY && !p.lit) {
      const pulse = 0.6 + 0.4 * Math.sin(time * 4.5);
      // Animated ring
      ctx.strokeStyle = `rgba(255,255,255,${pulse})`;
      ctx.lineWidth = 2.5;
      ctx.beginPath(); ctx.arc(px, py, p.size + 12, 0, Math.PI*2); ctx.stroke();
      // Rotating dots
      for (let a = 0; a < 4; a++) {
        const aa = time * 2.5 + a * Math.PI/2;
        const ax = px + Math.cos(aa) * (p.size + 18);
        const ay = py + Math.sin(aa) * (p.size + 18);
        ctx.fillStyle = `rgba(255,255,255,${pulse})`;
        ctx.beginPath(); ctx.arc(ax, ay, 2.5, 0, Math.PI*2); ctx.fill();
      }
    }

    // Name label — show for all unlit, bold for lit
    const showName = !p.lit || (i === targetPlanetIdx && state === S.PLAY);
    if (showName || p.lit) {
      ctx.fillStyle = p.lit ? 'rgba(255,255,255,0.85)' : 'rgba(255,255,255,0.5)';
      ctx.font = `${p.lit ? 11 : 9}px "PingFang SC","Microsoft YaHei",sans-serif`;
      ctx.textAlign = 'center';
      ctx.fillText(p.lit ? p.emoji+' '+p.name : p.name, px, py - p.size - 10);
    }
  }
}

function drawRocket() {
  ctx.save();
  const sway = state === S.START ? Math.sin(performance.now()/1000*1.5)*4 : 0;
  ctx.translate(rocket.x, rocket.y + sway);
  ctx.rotate(rocket.angle + Math.PI/2);

  const w = 24, h = 42, r = 12;

  if (state === S.DOCK) {
    ctx.shadowColor = 'rgba(255,255,200,0.6)';
    ctx.shadowBlur = 16;
  }

  // Body
  ctx.fillStyle = '#18181c';
  ctx.strokeStyle = '#ddd';
  ctx.lineWidth = 2;
  ctx.beginPath();
  ctx.arc(0, -h/2+r, r, Math.PI, 0, false);
  ctx.lineTo(w/2, h/2-r);
  ctx.arc(0, h/2-r, r, 0, Math.PI, false);
  ctx.lineTo(-w/2, -h/2+r);
  ctx.closePath();
  ctx.fill(); ctx.stroke();

  // Nose
  ctx.fillStyle = '#2a2a30';
  ctx.strokeStyle = '#ddd';
  ctx.beginPath();
  ctx.arc(0, -h/2+r, r*0.55, Math.PI, 0, false);
  ctx.fill(); ctx.stroke();

  // Stripe
  ctx.fillStyle = '#444';
  ctx.fillRect(-w/2, -1.5, w, 3);

  // Window
  ctx.fillStyle = '#18181c';
  ctx.strokeStyle = '#ddd';
  ctx.lineWidth = 1.5;
  ctx.beginPath(); ctx.arc(0, -10, 7, 0, Math.PI*2); ctx.fill(); ctx.stroke();
  ctx.fillStyle = '#fff';
  ctx.beginPath(); ctx.arc(-1.5, -12, 2, 0, Math.PI*2); ctx.fill();

  // Fins
  ctx.fillStyle = '#2a2a30';
  ctx.strokeStyle = '#ddd';
  ctx.lineWidth = 2;
  ctx.beginPath();
  ctx.moveTo(-w/2+2, h/2-14); ctx.lineTo(-w/2-8, h/2+5); ctx.lineTo(-w/2+6, h/2-4); ctx.closePath();
  ctx.fill(); ctx.stroke();
  ctx.beginPath();
  ctx.moveTo(w/2-2, h/2-14); ctx.lineTo(w/2+8, h/2+5); ctx.lineTo(w/2-6, h/2-4); ctx.closePath();
  ctx.fill(); ctx.stroke();

  // Engine
  ctx.fillStyle = '#111';
  ctx.strokeStyle = '#777';
  ctx.beginPath();
  ctx.moveTo(-3, h/2-r+2); ctx.lineTo(-5, h/2+2); ctx.lineTo(5, h/2+2); ctx.lineTo(3, h/2-r+2); ctx.closePath();
  ctx.fill(); ctx.stroke();

  // Face
  ctx.fillStyle = '#fff';
  ctx.beginPath(); ctx.arc(-3.5, -3, 2.2, 0, Math.PI*2); ctx.fill();
  ctx.beginPath(); ctx.arc(3.5, -3, 2.2, 0, Math.PI*2); ctx.fill();
  ctx.fillStyle = '#111';
  ctx.beginPath(); ctx.arc(-3.5, -3, 1.1, 0, Math.PI*2); ctx.fill();
  ctx.beginPath(); ctx.arc(3.5, -3, 1.1, 0, Math.PI*2); ctx.fill();
  ctx.strokeStyle = '#ddd';
  ctx.lineWidth = 1.2;
  ctx.beginPath(); ctx.arc(0, 0, 2.2, 0.2, Math.PI-0.2); ctx.stroke();
  ctx.fillStyle = 'rgba(255,255,255,0.06)';
  ctx.beginPath(); ctx.ellipse(-7, 0, 2.5, 1.8, 0, 0, Math.PI*2); ctx.fill();
  ctx.beginPath(); ctx.ellipse(7, 0, 2.5, 1.8, 0, 0, Math.PI*2); ctx.fill();

  ctx.shadowColor = 'transparent'; ctx.shadowBlur = 0;
  ctx.restore();
}

function drawWarp() {
  const p = warpP;
  ctx.fillStyle = `rgba(9,9,13,${p<0.4?p/0.4*0.9:0.9})`;
  ctx.fillRect(0, 0, W, H);

  if (p < 0.4) {
    const stretch = p/0.4 * Math.max(W, H);
    for (let i = 0; i < 120; i++) {
      const x = Math.random()*W, y = Math.random()*H;
      ctx.strokeStyle = `rgba(200,200,200,${0.15+Math.random()*0.4})`;
      ctx.lineWidth = 0.3+Math.random()*1;
      ctx.beginPath(); ctx.moveTo(x, y); ctx.lineTo(x+(Math.random()-0.5)*stretch, y-stretch*0.7); ctx.stroke();
    }
  } else if (p < 0.65) {
    const sp = (p-0.4)/0.25;
    const sx = W/2, sy = H/2+Math.sin(sp*Math.PI)*30;
    ctx.save(); ctx.translate(sx, sy); ctx.scale(1+sp*0.15, 1+sp*0.15);
    ctx.fillStyle = '#15151a'; ctx.strokeStyle = '#ddd'; ctx.lineWidth = 2;
    ctx.beginPath();
    ctx.moveTo(0,-45); ctx.lineTo(30,20); ctx.lineTo(10,14);
    ctx.lineTo(6,30); ctx.lineTo(-6,30); ctx.lineTo(-10,14); ctx.lineTo(-30,20); ctx.closePath();
    ctx.fill(); ctx.stroke();
    ctx.fillStyle = '#15151a';
    ctx.beginPath(); ctx.ellipse(0,-8,6,11,0,0,Math.PI*2); ctx.fill(); ctx.stroke();
    ctx.restore();
    ctx.fillStyle = '#ddd';
    ctx.font = 'bold 13px "PingFang SC","Microsoft YaHei",sans-serif';
    ctx.textAlign = 'center';
    ctx.fillText('自然选择号', sx, sy-72);
  } else {
    const ns = SOLAR_SYSTEMS[(sysIdx+1)%SOLAR_SYSTEMS.length];
    ctx.fillStyle = '#ddd';
    ctx.font = 'bold 16px "PingFang SC","Microsoft YaHei",sans-serif';
    ctx.textAlign = 'center';
    ctx.fillText(ns.name, W/2, H/2-16);
    ctx.fillStyle = 'rgba(255,255,255,0.5)';
    ctx.font = 'italic 12px "PingFang SC","Microsoft YaHei",sans-serif';
    ctx.fillText(ns.desc, W/2, H/2+16);
  }
}

// ─── Loop ───
function loop(ts) {
  const dt = lastTime ? Math.min((ts - lastTime)/1000, 0.05) : 0.016;
  lastTime = ts; time += dt;
  update(dt);
  draw();
  requestAnimationFrame(loop);
}

// ─── Boot ───
loadSystem();
requestAnimationFrame(loop);
</script>
</body>
</html>
